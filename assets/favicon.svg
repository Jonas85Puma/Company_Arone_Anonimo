<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Fondo navy con esquinas redondeadas -->
  <rect width="64" height="64" rx="13" fill="#111827"/>

  <!-- Borde dorado sutil -->
  <rect x="2" y="2" width="60" height="60" rx="11" fill="none" stroke="#FDBA12" stroke-width="1.5" opacity="0.35"/>

  <!-- Letra A como tuberías doradas -->
  <polyline
    points="10,54 32,11 54,54"
    fill="none" stroke="#FDBA12" stroke-width="8"
    stroke-linecap="round" stroke-linejoin="round"/>
  <line
    x1="21" y1="36" x2="43" y2="36"
    stroke="#FDBA12" stroke-width="8" stroke-linecap="round"/>

  <!-- Uniones de tubería (flanges) en las bases -->
  <circle cx="10" cy="54" r="6.5" fill="#FDBA12"/>
  <circle cx="10" cy="54" r="2.8" fill="#111827"/>
  <circle cx="54" cy="54" r="6.5" fill="#FDBA12"/>
  <circle cx="54" cy="54" r="2.8" fill="#111827"/>
</svg>
